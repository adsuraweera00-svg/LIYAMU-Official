<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/gif" href="/gif.png" />
    <title>Liyamu | Premium Independent Publishing</title>

    <meta name="description" content="Discover unique stories and publish your legacy. Liyamu is the home for high-fidelity independent digital books." />
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Outfit', sans-serif; }
      .initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        z-index: 9999;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #f1f5f9;
        border-top-color: #059669; /* Official Liyamu Emerald-600 */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 20px;
      }
      .loader-text {
        color: #0f172a;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body class="bg-slate-50">
    <div id="root">
      <div class="initial-loader">
        <div class="spinner"></div>
        <div class="loader-text">LIYAMU</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
